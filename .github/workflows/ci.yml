# SPDX-License-Identifier: EPL-2.0
#
# nous CI — Clojure tests
# Runs on push/PR to main across Ubuntu and macOS.
# C++ sidecar build removed: sidecar is deprecated, replaced by aion/kairos.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Clojure test suite
  # ---------------------------------------------------------------------------
  clojure:
    name: Clojure tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('project.clj') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Install Leiningen
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          lein: latest

      - name: Check out internal dependencies
        run: |
          git clone --depth 1 https://github.com/nomos-studio/nomos-maths    .deps/nomos-maths
          git clone --depth 1 https://github.com/nomos-studio/nomos-topology  .deps/nomos-topology
          git clone --depth 1 https://github.com/nomos-studio/alembic         .deps/alembic
          git clone --depth 1 https://github.com/nomos-studio/protomatter     .deps/protomatter
          git clone --depth 1 https://github.com/nomos-studio/txlog           .deps/txlog
          git clone --depth 1 https://github.com/nomos-studio/ctrl-tree       .deps/ctrl-tree

      - name: Install internal dependencies into local Maven
        run: |
          (cd .deps/nomos-maths    && lein install)
          (cd .deps/nomos-topology  && lein install)
          (cd .deps/alembic        && lein install)
          (cd .deps/protomatter    && lein install)
          (cd .deps/txlog/clj      && lein install)
          (cd .deps/ctrl-tree      && lein install)

      - name: Run test suite
        run: lein test
